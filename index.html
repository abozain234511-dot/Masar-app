<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="dashboard">Masar — Dashboard</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8b5cf6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Masar">
    <link rel="icon" type="image/png" href="./user-icon.png" sizes="32x32">
    <link rel="apple-touch-icon" href="./user-icon.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .hero {
            background: linear-gradient(135deg, rgba(139, 92, 246, .12) 0%, rgba(34, 211, 238, .08) 100%);
            border: 1px solid rgba(139, 92, 246, .2);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 28px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(124, 58, 237, .12), transparent 70%);
            top: -100px;
            right: -80px;
            pointer-events: none;
        }

        .hero::after {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(6, 182, 212, .08), transparent 70%);
            bottom: -50px;
            left: 60px;
            pointer-events: none;
        }

        .hero-greeting {
            font-size: .75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-3);
            margin-bottom: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600
        }

        .hero-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
            background: linear-gradient(135deg, #fff 0%, var(--purple-l) 50%, var(--cyan) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(167, 139, 250, 0.3);
        }

        .hero-sub {
            color: var(--text-2);
            font-size: .9rem;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
            line-height: 1.5
        }

        .quick-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1
        }

        .quick-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 18px;
            border-radius: 50px;
            background: rgba(255, 255, 255, .05);
            border: 1px solid var(--border2);
            color: var(--text-2);
            text-decoration: none;
            font-size: .82rem;
            transition: var(--transition);
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
        }

        .quick-link:hover {
            background: rgba(124, 58, 237, .1);
            border-color: rgba(124, 58, 237, .25);
            color: var(--purple-l)
        }

        .snap-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 14px;
            margin-bottom: 28px
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(205px, 1fr));
            gap: 14px
        }

        .fc {
            display: flex;
            flex-direction: column;
            background: var(--glass);
            border: 1.5px solid var(--border2);
            border-radius: 18px;
            padding: 22px;
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .fc::before {
            content: '';
            position: absolute;
            bottom: -24px;
            right: -24px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            opacity: .12;
            transition: var(--transition)
        }

        .fc-p::before {
            background: var(--purple)
        }

        .fc-c::before {
            background: var(--cyan)
        }

        .fc-o::before {
            background: var(--orange)
        }

        .fc:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, .3)
        }

        .fc-p:hover {
            border-color: rgba(124, 58, 237, .3)
        }

        .fc-c:hover {
            border-color: rgba(6, 182, 212, .25)
        }

        .fc-o:hover {
            border-color: rgba(219, 39, 119, .25)
        }

        .fc-icon {
            font-size: 1.7rem;
            margin-bottom: 14px
        }

        .fc-name {
            font-family: 'Outfit', sans-serif;
            font-size: .95rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 5px
        }

        .fc-desc {
            font-size: .72rem;
            color: var(--text-3);
            line-height: 1.5
        }

        .fc-arrow {
            margin-top: auto;
            padding-top: 14px;
            font-size: .75rem;
            color: var(--text-3);
            transition: var(--transition)
        }

        .fc:hover .fc-arrow {
            color: var(--purple-l)
        }

        .setup-banner {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(249, 168, 37, .05);
            border: 1px solid rgba(249, 168, 37, .2);
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 22px;
            font-size: .84rem;
            color: var(--text-2);
        }

        .setup-banner a {
            color: var(--purple-l);
            text-decoration: none;
            font-weight: 700
        }

        .setup-banner a:hover {
            text-decoration: underline
        }
    </style>
</head>

<body>
    <div class="layout">
        <nav class="sidebar">
            <div class="logo">
                <div class="logo-icon"><i data-lucide="dumbbell" style="color:#fff;width:22px;height:22px"></i>
                </div><span class="logo-text">Masar</span>
            </div>
            <div class="nav-section-label" data-i18n="main">Main</div>
            <a href="index.html" class="nav-item active"><i data-lucide="layout-dashboard"></i><span class="nav-label"
                    data-i18n="dashboard">Dashboard</span></a>
            <a href="stats.html" class="nav-item"><i data-lucide="zap"></i><span class="nav-label"
                    data-i18n="stats">Stats</span></a>

            <div class="nav-section-label" style="margin-top:14px" data-i18n="tools">Tools</div>
            <a href="diet.html" class="nav-item"><i data-lucide="utensils"></i><span class="nav-label"
                    data-i18n="diet">Diet Plan</span></a>
            <a href="workout.html" class="nav-item"><i data-lucide="dumbbell"></i><span class="nav-label"
                    data-i18n="workout">Workout</span></a>
            <a href="progress.html" class="nav-item"><i data-lucide="trending-up"></i><span class="nav-label"
                    data-i18n="progress">Progress</span></a>
            <a href="shopping.html" class="nav-item"><i data-lucide="shopping-cart"></i><span class="nav-label"
                    data-i18n="shopping">Shopping</span></a>

            <div class="nav-section-label" style="margin-top:14px" data-i18n="account">Account</div>
            <a href="settings.html" class="nav-item"><i data-lucide="settings"></i><span class="nav-label"
                    data-i18n="settings">Settings</span></a>
            <a href="login.html" id="auth-link" class="nav-item"><i data-lucide="log-in"></i><span class="nav-label"
                    data-i18n="login">Login</span></a>

            <div class="sidebar-footer">
                <div style="color: var(--purple-l); font-weight: 600; font-size: 0.85rem; margin-bottom: 4px;">✨ Define
                    Your Masar</div>
                <span style="opacity: 0.6; font-size: 0.75rem;">Masar v2.0</span>
            </div>
        </nav>
        <main class="main">
            <div class="main-inner">

                <div id="dashboard-hero-root">
                    <!-- Hero section rendered by React component -->
                </div>

                <div id="setup-banner" class="setup-banner" style="display:none">
                    <span data-i18n="setup_desc">⚠️ Start by calculating your profile — </span> <a href="stats.html"
                        data-i18n="setup_stats">Setup Stats →</a>
                </div>

                <div id="dashboard-snap-root"></div>

                <div id="dashboard-features-root">
                    <div class="section fade-up-3">
                        <div class="section-title" data-i18n="features">Features</div>
                        <div class="feature-grid">
                            <!-- Skeleton/Initial state -->
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>
    <div class="toast" id="toast"></div>
    <script src="state.js"></script>
    <script src="i18n.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="shared-animations.js"></script>
    <script src="dashboard-components.js"></script>
    <script>
        // Check authentication - redirect to login if not logged in
        const token = localStorage.getItem('masar_token');
        if (!token) {
            window.location.href = 'login.html';
        }

        // Fetch latest data from server before checking auth state
        fetchAndSaveState().then(() => {
            const S = loadState();

            // If no token or no user, redirect to login
            if (!token || !S.user) {
                window.location.href = 'login.html';
            }

            // Update auth link to show logout if user is logged in
            const authLink = document.getElementById('auth-link');
            const authLabel = authLink.querySelector('.nav-label');
            const authIcon = authLink.querySelector('i');

            if (S.user) {
                // User is logged in - show logout
                authLabel.setAttribute('data-i18n', 'logout');
                authLabel.textContent = S.lang === 'ar' ? 'تسجيل الخروج' : 'Logout';
                authLink.href = '#';
                authLink.onclick = function (e) {
                    e.preventDefault();
                    logout();
                };
                // Replace the icon manually with logout SVG
                authIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>';
            }

            setActiveNav();
            const state = loadState();
            applyTranslations();
            lucide.createIcons();
        });

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('SW registered:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('SW registration failed:', error);
                    });
            });
        }
    </script>
</body>

</html>
