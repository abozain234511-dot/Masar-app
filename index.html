<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Masar — Dashboard</title>
    <link rel="icon" type="image/png" href="./user-icon.png" sizes="32x32">
    <link rel="stylesheet" href="shared.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8b5cf6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Masar">
    <link rel="apple-touch-icon" href="./user-icon.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="shared-animations.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: #050505;
            min-height: 100vh;
            margin: 0;
            font-family: 'Outfit', 'Inter', sans-serif;
            color: #fff;
        }

        #app {
            min-height: 100vh;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #8b5cf6;
            font-size: 18px;
        }

        .error {
            padding: 20px;
            text-align: center;
            color: #ef4444;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0a0a0a;
            border-top: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 1000;
        }

        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #666;
            font-size: 12px;
            gap: 4px;
            padding: 8px 16px;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .bottom-nav a:hover {
            background: rgba(139, 92, 246, 0.1);
        }

        .bottom-nav a.active {
            color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
        }

        .bottom-nav a i {
            width: 24px;
            height: 24px;
        }

        /* Hide bottom nav on auth pages */
        body.auth-page .bottom-nav {
            display: none;
        }

        body.auth-page {
            padding-bottom: 0;
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="loading">Loading...</div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" id="bottomNav" style="display: none;">
        <a href="#/home" data-route="home"><i data-lucide="home"></i><span>Home</span></a>
        <a href="#/workout" data-route="workout"><i data-lucide="dumbbell"></i><span>Workout</span></a>
        <a href="#/progress" data-route="progress"><i data-lucide="trending-up"></i><span>Progress</span></a>
        <a href="#/stats" data-route="stats"><i data-lucide="bar-chart-2"></i><span>Stats</span></a>
        <a href="#/settings" data-route="settings"><i data-lucide="settings"></i><span>Settings</span></a>
    </nav>

    <!-- Scripts -->
    <script src="state.js"></script>
    <script src="i18n.js"></script>
    <script src="router.js"></script>
    <script>
        // Initialize router with routes
        document.addEventListener('DOMContentLoaded', function () {
            // Register routes - load external HTML files for all pages
            Router.registerRoute('/login', async () => {
                const res = await fetch('login.html');
                return await res.text();
            });
            Router.registerRoute('/signup', async () => {
                const res = await fetch('signup.html');
                return await res.text();
            });
            Router.registerRoute('/home', async () => {
                const res = await fetch('home.html');
                return await res.text();
            });
            Router.registerRoute('/', async () => {
                // Check if user is logged in
                const token = localStorage.getItem('masar_token');
                if (token) {
                    window.location.hash = '#/home';
                    return '<div class="loading">Redirecting...</div>';
                } else {
                    window.location.hash = '#/login';
                    return '<div class="loading">Redirecting...</div>';
                }
            });

            Router.registerRoute('/workout', async () => {
                const res = await fetch('workout.html');
                return await res.text();
            });
            Router.registerRoute('/diet', async () => {
                const res = await fetch('diet.html');
                return await res.text();
            });
            Router.registerRoute('/progress', async () => {
                const res = await fetch('progress.html');
                return await res.text();
            });
            Router.registerRoute('/stats', async () => {
                const res = await fetch('stats.html');
                return await res.text();
            });
            Router.registerRoute('/shopping', async () => {
                const res = await fetch('shopping.html');
                return await res.text();
            });
            Router.registerRoute('/settings', async () => {
                const res = await fetch('settings.html');
                return await res.text();
            });

            // Show/hide bottom nav based on route
            const originalRender = Router.render;
            Router.render = async function () {
                await originalRender();
                const path = Router.getRoute();
                const isAuthPage = path === '/login' || path === '/signup';
                const bottomNav = document.getElementById('bottomNav');

                if (isAuthPage) {
                    bottomNav.style.display = 'none';
                    document.body.classList.add('auth-page');
                } else {
                    bottomNav.style.display = 'flex';
                    document.body.classList.remove('auth-page');
                }

                // Re-initialize lucide icons
                if (window.lucide) {
                    lucide.createIcons();
                }
            };

            // Initialize the router
            Router.initRouter();
        });
    </script>
</body>

</html>
