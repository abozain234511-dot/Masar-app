<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="login">Masar — Login</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8b5cf6">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: #050505;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(34, 211, 238, 0.1) 0%, transparent 40%);
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            padding: 48px 40px;
            background: rgba(15, 15, 20, 0.7);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px rgba(139, 92, 246, 0.1);
            animation: authFadeUp .8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
                border-radius: 20px;
                margin: 10px;
            }

            body {
                padding: 10px;
            }
        }

        @keyframes authFadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .auth-logo {
            display: inline-flex;
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--purple), var(--cyan));
            border-radius: 20px;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 12px 24px rgba(139, 92, 246, 0.3);
            position: relative;
        }

        .auth-logo::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--purple), var(--cyan));
            z-index: -1;
            opacity: 0.3;
            filter: blur(8px);
        }

        .auth-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, #a1a1aa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .auth-sub {
            font-size: 0.95rem;
            color: var(--text-2);
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--purple-l);
            margin-bottom: 8px;
            font-weight: 700;
            padding-left: 4px;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border2);
            border-radius: 16px;
            color: #fff;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--purple);
            background: rgba(139, 92, 246, 0.05);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
        }

        .auth-footer {
            text-align: center;
            margin-top: 32px;
            font-size: 0.9rem;
            color: var(--text-2);
        }

        .auth-link {
            color: var(--purple-l);
            text-decoration: none;
            font-weight: 700;
            margin-inline-start: 5px;
            transition: var(--transition);
        }

        .auth-link:hover {
            color: #fff;
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
        }

        body.rtl .auth-card {
            text-align: right;
        }

        body.rtl .form-label {
            padding-left: 0;
            padding-right: 4px;
        }

        .back-link {
            position: absolute;
            top: 24px;
            left: 24px;
            font-size: 0.8rem;
            color: var(--text-3);
            text-decoration: none;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--purple-l);
        }

        body.rtl .back-link {
            left: auto;
            right: 24px;
        }

        /* Google Sign-In Button */
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px 18px;
            margin-top: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border2);
            border-radius: 16px;
            color: #fff;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .google-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .google-btn svg {
            width: 20px;
            height: 20px;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--text-3);
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border2);
        }

        .divider span {
            padding: 0 16px;
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <a href="index.html" class="back-link" data-i18n="back_to_dashboard">← Back to Dashboard</a>
        <div class="auth-header">
            <div class="auth-logo">
                <i data-lucide="dumbbell"></i>
            </div>
            <p style="color: var(--purple-l); font-weight: 600; margin: 8px 0 -5px; font-size: 0.95rem;">✨ Define Your
                Masar</p>
            <h1 class="auth-title" data-i18n="auth_title">Welcome Back</h1>
            <p class="auth-sub" data-i18n="auth_sub">Sign in to access your personalized fitness journey</p>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <input type="text" class="form-input" id="username" placeholder=" " required>
                <label class="form-label" data-i18n="username">Username</label>
            </div>
            <div class="form-group">
                <input type="password" class="form-input" id="password" placeholder=" " required>
                <label class="form-label" data-i18n="password">Password</label>
            </div>
            <button type="submit" id="login-btn" class="btn btn-primary btn-full"
                style="margin-top: 10px; padding: 14px; width: 100%; cursor: pointer; display: block;">
                <span data-i18n="sign_in" style="font-size: 1rem">Sign In</span>
            </button>
        </form>

        <div class="divider"><span data-i18n="or">or</span></div>

        <button type="button" class="google-btn" onclick="handleGoogleSignIn()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path fill="#4285F4"
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                <path fill="#34A853"
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                <path fill="#FBBC05"
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                <path fill="#EA4335"
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            <span data-i18n="sign_in_google">Continue with Google</span>
        </button>



        <div class="auth-footer">
            <span data-i18n="no_account">Don't have an account?</span>
            <a href="signup.html" class="auth-link" data-i18n="sign_up">Sign Up</a>
        </div>
        <div
            style="text-align: center; padding-top: 20px; font-size: 0.75rem; color: #666; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 20px;">
            <span>&copy; 2026 Masar. All rights reserved.</span>
            <a href="https://masar-gym.vercel.app/privacy" target="_blank"
                style="text-decoration: none; color: #8b5cf6; margin-left: 8px;">Privacy Policy</a>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="state.js"></script>
    <script src="i18n.js"></script>
    <script src="shared-animations.js"></script>
    <script>
        lucide.createIcons();
        applyTranslations();

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('SW registered:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('SW registration failed:', error);
                    });
            });
        }

        // Check if already logged in
        if (getToken()) {
            location.href = 'index.html';
        }



        async function handleLogin(e) {
            e.preventDefault();
            const identifier = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');

            if (!identifier || !password) {
                showToast(t('all_fields_required'));
                return;
            }

            btn.disabled = true;
            btn.textContent = '...';
            try {
                console.log('Attempting login with:', identifier);
                const res = await api('/login', 'POST', { identifier, password });
                console.log('Login successful:', res);
                handleAuthSuccess(res);
            } catch (err) {
                console.error('Login error:', err);
                showToast(t(err.message) || err.message || 'Login failed');
                btn.disabled = false;
                btn.textContent = t('sign_in');
            }
        }

        async function handleGoogleSignIn() {
            try {
                // Check if running in Capacitor Native with the Google Auth plugin
                if (window.Capacitor && window.Capacitor.isNativePlatform() && window.Capacitor.Plugins.GoogleAuth) {
                    console.log('Using Native Google Sign-In');
                    const user = await window.Capacitor.Plugins.GoogleAuth.signIn();
                    console.log('Native Google Login success:', user);

                    // The plugin returns the user object with idToken
                    const res = await api('/google-auth', 'POST', { idToken: user.authentication.idToken });
                    handleAuthSuccess(res);
                } else {
                    // Fallback to web GSI
                    console.log('Using Web Google Sign-In');
                    const client = google.accounts.oauth2.initTokenClient({
                        client_id: '758236261474-2g4lrqir83avkfo7pn8laao77h5i8noc.apps.googleusercontent.com',
                        scope: 'https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email',
                        callback: async (response) => {
                            if (response.error) {
                                console.error('Google sign-in error:', response.error);
                                showToast(t('google_auth_failed'));
                                return;
                            }
                            try {
                                const res = await api('/google-auth', 'POST', { accessToken: response.access_token });
                                handleAuthSuccess(res);
                            } catch (err) {
                                showToast(t(err.message || 'google_auth_failed'));
                            }
                        },
                    });
                    client.requestAccessToken();
                }
            } catch (err) {
                console.error('Google sign-in error:', err);
                if (err.message !== 'user cancelled' && err.message !== 'CHOSEN_ACCOUNT_NOT_FOUND') {
                    showToast(t('google_auth_failed'));
                }
            }
        }

        function handleAuthSuccess(res) {
            setToken(res.token);

            const s = loadState();
            s.user = res.user.name;
            s.userprofile = {
                name: res.user.name,
                email: res.user.email,
                photo: res.user.photo || null,
                provider: 'google'
            };

            // Fetch user data from backend
            api('/data').then(data => Object.assign(s, data));

            saveState(s);
            showToast(t('welcome_back_user', { user: res.user.name }));
            setTimeout(() => location.href = 'index.html', 1500);
        }
    </script>
</body>

</html>
